name: Manual Deploy to Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The image tag to deploy (e.g., "latest" or "v1.0.1")'
        required: true
        type: string
        default: 'latest'

jobs:
  deploy:
    name: Deploy to demo node VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key and Known Hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Use the verified host key from secrets for security.
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Copy configuration to server
        run: |
          # The host is now verified via known_hosts, so no extra SSH options are needed.
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'mkdir -p ~/app/evochora-node'
          
          scp infrastructure/docker/docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/docker-compose.yml
          scp infrastructure/docker/docker-compose.node.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/docker-compose.node.yml
          scp infrastructure/docker/evochora-node/evochora.node.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/evochora-node/evochora.node.conf
          scp evochora.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/evochora.conf

      - name: Deploy using Docker Compose
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/app
            
            export IMAGE_TAG=${{ github.event.inputs.tag }}
            
            # Create a temporary .env file on the server to configure the production ports.
            cat <<EOT > .env
            UID=$(id -u)
            GID=$(id -g)
            DOCKER_WEB_UI_BIND_IP=0.0.0.0
            DOCKER_WEB_UI_PORT=80
            DOCKER_H2_CONSOLE_BIND_IP=0.0.0.0
            DOCKER_H2_CONSOLE_PORT=8082
            DOCKER_H2_TCP_BIND_IP=0.0.0.0
            DOCKER_H2_TCP_PORT=9092
            EOT
            
            docker compose pull
            
            # Use --remove-orphans to ensure any old, unused containers are cleaned up.
            # The .env file is read automatically. We do not use 'down' to minimize downtime.
            docker compose -f docker-compose.yml -f docker-compose.node.yml up -d --remove-orphans
            
            # Clean up the temporary .env file.
            rm .env
          EOF
